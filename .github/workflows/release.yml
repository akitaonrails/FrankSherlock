name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: sherlock/desktop/src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        working-directory: sherlock/desktop
        run: npm ci

      - name: Download PDFium
        working-directory: sherlock/desktop/src-tauri
        shell: bash
        run: bash scripts/download-pdfium.sh

      - name: Run Rust tests
        working-directory: sherlock/desktop/src-tauri
        run: cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: sherlock/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Frank Sherlock ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Install

            | Platform | File |
            |----------|------|
            | Linux (AppImage) | `frank-sherlock_*_amd64.AppImage` |
            | macOS (Apple Silicon) | `frank-sherlock_*_aarch64.dmg` |
            | Windows | `frank-sherlock_*_x64-setup.exe` |

            ### Prerequisites
            - [Ollama](https://ollama.com) must be installed and running locally
            - The app will prompt you to download the required model (`qwen2.5vl:7b`) on first launch
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.rust_target }}
